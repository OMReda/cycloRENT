<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | CycloRent</title>
    <!-- Font Awesome -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>.lucide { width: 1.25em; height: 1.25em; vertical-align: -0.125em; }</style>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            background: #fff;
            color: #000;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ── SPLIT LAYOUT ── */
        .split-left {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem 10%;
            position: relative;
        }
        
        .split-right {
            width: 50%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* ── LEFT CONTENT ── */
        .login-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1.5px;
            margin-bottom: 0.5rem;
            color: #000;
            line-height: 1;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 3.5rem;
        }

        /* ── FORMS ── */
        .form-group {
            margin-bottom: 2rem;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #000;
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            border: none;
            border-bottom: 2px solid #000;
            background: transparent;
            padding: 0.5rem 0;
            font-size: 1rem;
            color: #000;
            font-family: 'Inter', sans-serif;
            border-radius: 0;
            transition: border-color 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-bottom-color: #000;
        }

        .form-control::placeholder {
            color: #999;
        }

        /* ── BUTTON ── */
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: #000000; /* Pure black */
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: #1a1a1a;
        }

        /* ── ALERTS ── */
        .error-message {
            color: #dc2626;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ── FOOTER ── */
        .login-footer {
            position: absolute;
            bottom: 2rem;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: #333;
        }

        /* ── RIGHT GRAPHIC ── */
        .bike-graphic {
            width: 80%;
            height: auto;
            max-width: 600px;
            opacity: 0.15; /* Very subtle line art */
            color: #ffffff;
            stroke-width: 1;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 992px) {
            .split-right { display: none; }
            .split-left { width: 100%; padding: 2rem; }
        }
    </style>
</head>
<body>

    <div class="split-left">
        <div class="login-container">
            <h1>CycloRent</h1>
            <div class="subtitle">Système de gestion de location de vélos</div>

            {% if form.errors %}
            <div class="error-message">
                <i data-lucide="alert-circle"></i>
                Identifiants incorrects. Veuillez réessayer.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label" for="id_username">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control" id="id_username" placeholder="Nom d'utilisateur" autofocus required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="id_password">Mot de passe</label>
                    <input type="password" name="password" class="form-control" id="id_password" placeholder="Mot de passe" required>
                </div>

                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit" class="btn-login">Se connecter</button>
            </form>
        </div>

        <div class="login-footer">
            <i data-lucide="lock" class="me-1"></i> © {% now "Y" %} CycloRent. Accès réservé au personnel autorisé.
        </div>
    </div>

    <div class="split-right">
        <!-- Minimalist Line Art Bike via Lucide -->
        <i data-lucide="bike" class="bike-graphic"></i>
    </div>

<script>lucide.createIcons();</script>
</body>
</html>
